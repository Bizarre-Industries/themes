name: Verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install portable validation tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes libxml2-utils zsh

      - name: Run repository tests
        run: npm test

      - name: Verify Open Design package
        run: npm run check:open-design

      - name: Verify showcase captures
        run: npm run check:showcase
