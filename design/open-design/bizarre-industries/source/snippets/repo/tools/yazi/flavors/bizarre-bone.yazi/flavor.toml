# Bizarre Bone - Yazi flavor
[app]
overall = { bg = "#F5F2EA" }

[mgr]
cwd = { fg = "#4A7409", bold = true }
hovered = { fg = "#2B2B2B", bg = "#DDD8CB" }
preview_hovered = { fg = "#2B2B2B", bg = "#DDD8CB" }
find_keyword = { fg = "#4A7409", bg = "#EDE9DD", bold = true }
find_position = { fg = "#1F4FB0", bg = "reset", bold = true }
marker_copied = { fg = "#36691B", bg = "#36691B" }
marker_cut = { fg = "#AC2468", bg = "#AC2468" }
marker_marked = { fg = "#97460D", bg = "#97460D" }
marker_selected = { fg = "#5F8A0F", bg = "#5F8A0F" }
count_copied = { fg = "#F9F8F2", bg = "#36691B", bold = true }
count_cut = { fg = "#F9F8F2", bg = "#AC2468", bold = true }
count_selected = { fg = "#0E0E0E", bg = "#5F8A0F", bold = true }
border_symbol = "│"
border_style = { fg = "#DDD8CB" }

[tabs]
active = { fg = "#0E0E0E", bg = "#5F8A0F", bold = true }
inactive = { fg = "#4A4A4A", bg = "#EDE9DD" }

[mode]
normal_main = { fg = "#0E0E0E", bg = "#5F8A0F", bold = true }
normal_alt = { fg = "#4A7409", bg = "#EDE9DD" }
select_main = { fg = "#F9F8F2", bg = "#1F4FB0", bold = true }
select_alt = { fg = "#1F4FB0", bg = "#EDE9DD" }
unset_main = { fg = "#F9F8F2", bg = "#97460D", bold = true }
unset_alt = { fg = "#97460D", bg = "#EDE9DD" }

[status]
perm_sep = { fg = "#DDD8CB" }
perm_type = { fg = "#1F4FB0" }
perm_read = { fg = "#97460D" }
perm_write = { fg = "#AC2468" }
perm_exec = { fg = "#36691B" }
progress_label = { fg = "#2B2B2B", bold = true }
progress_normal = { fg = "#36691B", bg = "#DDD8CB" }
progress_error = { fg = "#F9F8F2", bg = "#AC2468", bold = true }

[pick]
border = { fg = "#DDD8CB" }
active = { fg = "#4A7409", bold = true }
inactive = {}

[input]
border = { fg = "#DDD8CB" }
title = {}
value = {}
selected = { fg = "#4A7409", bold = true }

[cmp]
border = { fg = "#DDD8CB" }

[tasks]
border = { fg = "#DDD8CB" }
title = { fg = "#4A7409", bold = true }
hovered = { fg = "#2B2B2B", bg = "#DDD8CB" }

[which]
mask = { fg = "#C8C2B2" }
cand = { fg = "#4A7409" }
rest = { fg = "#4A4A4A" }
desc = { fg = "#1F4FB0" }
separator = " > "
separator_style = { fg = "#DDD8CB" }

[help]
on = { fg = "#4A7409", bold = true }
run = { fg = "#1F4FB0" }
hovered = { fg = "#2B2B2B", bg = "#DDD8CB", bold = true }
footer = { fg = "#0E0E0E", bg = "#5F8A0F", bold = true }

[spot]
border = { fg = "#DDD8CB" }
title = { fg = "#4A7409", bold = true }
tbl_col = { fg = "#1F4FB0" }
tbl_cell = { fg = "#2B2B2B", bg = "#DDD8CB" }

[notify]
title_info = { fg = "#36691B" }
title_warn = { fg = "#97460D" }
title_error = { fg = "#AC2468" }

[filetype]
rules = [
  { mime = "image/*", fg = "#7E2A9A" },
  { mime = "{audio,video}/*", fg = "#B8276F" },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#97460D" },
  { mime = "application/{pdf,doc,rtf}", fg = "#1F4FB0" },
  { mime = "vfs/{absent,stale}", fg = "#B0AA9A" },
  { url = "*", fg = "#2B2B2B" },
  { url = "*/", fg = "#1F4FB0" },
]
