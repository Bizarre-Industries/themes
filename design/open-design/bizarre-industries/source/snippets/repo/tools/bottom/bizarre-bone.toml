# Bizarre Bone - bottom
# Merge into ~/.config/bottom/bottom.toml.
[styles]

[styles.cpu]
all_entry_color = "#4A7409"
avg_entry_color = "#1F4FB0"
cpu_core_colors = ["#4A7409", "#1F4FB0", "#A55A1B", "#97460D", "#7E2A9A", "#36691B"]

[styles.memory]
ram_color = "#4A7409"
cache_color = "#1F4FB0"
swap_color = "#97460D"
arc_color = "#A55A1B"
gpu_colors = ["#1F4FB0", "#7E2A9A", "#97460D"]

[styles.network]
rx_color = "#1F4FB0"
tx_color = "#4A7409"
rx_total_color = "#A55A1B"
tx_total_color = "#36691B"

[styles.battery]
high_battery_color = "#36691B"
medium_battery_color = "#97460D"
low_battery_color = "#AC2468"

[styles.tables]
headers = { color = "#4A7409", bg_color = "#EDE9DD", bold = true }

[styles.graphs]
graph_color = "#4A4A4A"
legend_text = { color = "#4A4A4A", bg_color = "#F5F2EA" }

[styles.widgets]
border_color = "#DDD8CB"
selected_border_color = "#5F8A0F"
widget_title = { color = "#4A7409", bg_color = "#F5F2EA" }
text = { color = "#2B2B2B", bg_color = "#F5F2EA" }
selected_text = { color = "#0E0E0E", bg_color = "#D4E89F", bold = true }
disabled_text = { color = "#B0AA9A" }
thread_text = { color = "#1F4FB0" }
