# Bizarre Industries - tmux statusline
# CATCH THE STARS.
#
# Source from ~/.tmux.conf:
#   source-file ~/dotfiles/bizarre/terminals/tmux/bizarre.tmux.conf
#
# Set @bizarre-variant before sourcing this file. Unset defaults to void.

%if #{||:#{==:#{@bizarre-variant},},#{==:#{@bizarre-variant},void}}
set -g @bizarre-variant "void"
# -- Bizarre Void --
set -g status-style "bg=#0E0E0E,fg=#E4E4E4"
set -g status-left  "#[bg=#C6FF24,fg=#0E0E0E,bold] BZR ✦ #S #[bg=#0E0E0E,fg=#C6FF24]"
set -g status-right "#[fg=#3D3D3D]✦ #[fg=#E4E4E4]%H:%M #[fg=#3D3D3D]✦ #[fg=#E4E4E4]%a %b %d "
set -g status-left-length 40
set -g status-right-length 60
set -g window-status-format         "#[fg=#9C9C9C] #I:#W "
set -g window-status-current-format "#[bg=#C6FF24,fg=#0E0E0E,bold] #I:#W "
set -g window-status-separator ""
set -g pane-border-style        "fg=#3D3D3D"
set -g pane-active-border-style "fg=#C6FF24"
set -g message-style "bg=#C6FF24,fg=#0E0E0E,bold"
set -g message-command-style "bg=#3D3D3D,fg=#E4E4E4"
set -g mode-style "bg=#C6FF24,fg=#0E0E0E"
set -g clock-mode-colour "#C6FF24"
set -g copy-mode-match-style "bg=#C6FF24,fg=#0E0E0E"
set -g copy-mode-current-match-style "bg=#FFB85C,fg=#0E0E0E"
%elif #{==:#{@bizarre-variant},void-hicontrast}
# -- Bizarre Void Hi-Contrast --
set -g status-style "bg=#000000,fg=#F9F8F2"
set -g status-left  "#[bg=#C6FF24,fg=#0E0E0E,bold] BZR ✦ #S #[bg=#000000,fg=#C6FF24]"
set -g status-right "#[fg=#545454]✦ #[fg=#F9F8F2]%H:%M #[fg=#545454]✦ #[fg=#F9F8F2]%a %b %d "
set -g status-left-length 40
set -g status-right-length 60
set -g window-status-format         "#[fg=#B8B8B8] #I:#W "
set -g window-status-current-format "#[bg=#C6FF24,fg=#0E0E0E,bold] #I:#W "
set -g window-status-separator ""
set -g pane-border-style        "fg=#545454"
set -g pane-active-border-style "fg=#C6FF24"
set -g message-style "bg=#C6FF24,fg=#0E0E0E,bold"
set -g message-command-style "bg=#545454,fg=#F9F8F2"
set -g mode-style "bg=#C6FF24,fg=#0E0E0E"
set -g clock-mode-colour "#C6FF24"
set -g copy-mode-match-style "bg=#C6FF24,fg=#0E0E0E"
set -g copy-mode-current-match-style "bg=#FFB85C,fg=#0E0E0E"
%elif #{==:#{@bizarre-variant},workshop}
# -- Bizarre Workshop --
set -g status-style "bg=#1A1815,fg=#E4E2DA"
set -g status-left  "#[bg=#C6FF24,fg=#0E0E0E,bold] BZR ✦ #S #[bg=#1A1815,fg=#C6FF24]"
set -g status-right "#[fg=#3D3A33]✦ #[fg=#E4E2DA]%H:%M #[fg=#3D3A33]✦ #[fg=#E4E2DA]%a %b %d "
set -g status-left-length 40
set -g status-right-length 60
set -g window-status-format         "#[fg=#9C9A91] #I:#W "
set -g window-status-current-format "#[bg=#C6FF24,fg=#0E0E0E,bold] #I:#W "
set -g window-status-separator ""
set -g pane-border-style        "fg=#3D3A33"
set -g pane-active-border-style "fg=#C6FF24"
set -g message-style "bg=#C6FF24,fg=#0E0E0E,bold"
set -g message-command-style "bg=#3D3A33,fg=#E4E2DA"
set -g mode-style "bg=#C6FF24,fg=#0E0E0E"
set -g clock-mode-colour "#C6FF24"
set -g copy-mode-match-style "bg=#C6FF24,fg=#0E0E0E"
set -g copy-mode-current-match-style "bg=#FFB85C,fg=#0E0E0E"
%elif #{==:#{@bizarre-variant},paper}
# -- Bizarre Paper --
set -g status-style "bg=#F9F8F2,fg=#1F1F1F"
set -g status-left  "#[bg=#5F8A0F,fg=#0E0E0E,bold] BZR ✦ #S #[bg=#F9F8F2,fg=#4A7409]"
set -g status-right "#[fg=#D8D4C7]✦ #[fg=#1F1F1F]%H:%M #[fg=#D8D4C7]✦ #[fg=#1F1F1F]%a %b %d "
set -g status-left-length 40
set -g status-right-length 60
set -g window-status-format         "#[fg=#3D3D3D] #I:#W "
set -g window-status-current-format "#[bg=#5F8A0F,fg=#0E0E0E,bold] #I:#W "
set -g window-status-separator ""
set -g pane-border-style        "fg=#D8D4C7"
set -g pane-active-border-style "fg=#5F8A0F"
set -g message-style "bg=#5F8A0F,fg=#0E0E0E,bold"
set -g message-command-style "bg=#D8D4C7,fg=#1F1F1F"
set -g mode-style "bg=#5F8A0F,fg=#0E0E0E"
set -g clock-mode-colour "#5F8A0F"
set -g copy-mode-match-style "bg=#5F8A0F,fg=#0E0E0E"
set -g copy-mode-current-match-style "bg=#97460D,fg=#F9F8F2"
%elif #{==:#{@bizarre-variant},bone}
# -- Bizarre Bone --
set -g status-style "bg=#F5F2EA,fg=#2B2B2B"
set -g status-left  "#[bg=#5F8A0F,fg=#0E0E0E,bold] BZR ✦ #S #[bg=#F5F2EA,fg=#4A7409]"
set -g status-right "#[fg=#DDD8CB]✦ #[fg=#2B2B2B]%H:%M #[fg=#DDD8CB]✦ #[fg=#2B2B2B]%a %b %d "
set -g status-left-length 40
set -g status-right-length 60
set -g window-status-format         "#[fg=#4A4A4A] #I:#W "
set -g window-status-current-format "#[bg=#5F8A0F,fg=#0E0E0E,bold] #I:#W "
set -g window-status-separator ""
set -g pane-border-style        "fg=#DDD8CB"
set -g pane-active-border-style "fg=#5F8A0F"
set -g message-style "bg=#5F8A0F,fg=#0E0E0E,bold"
set -g message-command-style "bg=#DDD8CB,fg=#2B2B2B"
set -g mode-style "bg=#5F8A0F,fg=#0E0E0E"
set -g clock-mode-colour "#5F8A0F"
set -g copy-mode-match-style "bg=#5F8A0F,fg=#0E0E0E"
set -g copy-mode-current-match-style "bg=#97460D,fg=#F9F8F2"
%else
display-message "Bizarre: invalid @bizarre-variant '#{@bizarre-variant}'"
%endif
