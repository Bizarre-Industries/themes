# Bizarre Bone for Hyprland
$bizarre_bg = rgb(F5F2EA)
$bizarre_fg = rgb(2B2B2B)
$bizarre_accent = rgb(5F8A0F)
$bizarre_border = rgb(DDD8CB)

general {
  col.active_border = rgba(5F8A0Fff)
  col.inactive_border = rgba(DDD8CBcc)
}

decoration {
  rounding = 6
  shadow {
    color = rgba(F5F2EAdd)
    color_inactive = rgba(EDE9DDaa)
  }
}

group {
  col.border_active = rgba(5F8A0Fff)
  col.border_inactive = rgba(DDD8CBff)
  groupbar {
    col.active = rgba(5F8A0Fff)
    col.inactive = rgba(EDE9DDff)
    text_color = rgba(2B2B2Bff)
  }
}
