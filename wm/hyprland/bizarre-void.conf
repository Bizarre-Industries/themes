# Bizarre Void for Hyprland
$bizarre_bg = rgb(0E0E0E)
$bizarre_fg = rgb(E4E4E4)
$bizarre_accent = rgb(C6FF24)
$bizarre_border = rgb(3D3D3D)

general {
  col.active_border = rgba(C6FF24ff)
  col.inactive_border = rgba(3D3D3Dcc)
}

decoration {
  rounding = 6
  shadow {
    color = rgba(0E0E0Edd)
    color_inactive = rgba(1A1A1Aaa)
  }
}

group {
  col.border_active = rgba(C6FF24ff)
  col.border_inactive = rgba(3D3D3Dff)
  groupbar {
    col.active = rgba(C6FF24ff)
    col.inactive = rgba(1A1A1Aff)
    text_color = rgba(E4E4E4ff)
  }
}
