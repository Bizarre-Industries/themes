# Bizarre Paper for Hyprland
$bizarre_bg = rgb(F9F8F2)
$bizarre_fg = rgb(1F1F1F)
$bizarre_accent = rgb(5F8A0F)
$bizarre_border = rgb(D8D4C7)

general {
  col.active_border = rgba(5F8A0Fff)
  col.inactive_border = rgba(D8D4C7cc)
}

decoration {
  rounding = 6
  shadow {
    color = rgba(F9F8F2dd)
    color_inactive = rgba(F2F0EAaa)
  }
}

group {
  col.border_active = rgba(5F8A0Fff)
  col.border_inactive = rgba(D8D4C7ff)
  groupbar {
    col.active = rgba(5F8A0Fff)
    col.inactive = rgba(F2F0EAff)
    text_color = rgba(1F1F1Fff)
  }
}
