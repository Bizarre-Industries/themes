# Bizarre Industries - tmux
set -g status-style "bg=#1A1A1A,fg=#9C9C9C"
set -g status-left "#[bg=#C6FF24,fg=#0E0E0E,bold] bzr #[bg=#1A1A1A,fg=#C6FF24] "
set -g status-right "#[fg=#7A7A7A]#S #[fg=#C6FF24]CATCH THE STARS "
set -g pane-border-style "fg=#3D3D3D"
set -g pane-active-border-style "fg=#C6FF24"
set -g message-style "bg=#C6FF24,fg=#0E0E0E,bold"
set -g mode-style "bg=#2B3A0E,fg=#E4E4E4"
