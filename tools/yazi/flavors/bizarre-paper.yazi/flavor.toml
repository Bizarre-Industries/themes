# Bizarre Paper - Yazi flavor
[app]
overall = { bg = "#F9F8F2" }

[mgr]
cwd = { fg = "#5F8A0F", bold = true }
hovered = { fg = "#1F1F1F", bg = "#E6E3DA" }
preview_hovered = { fg = "#1F1F1F", bg = "#E6E3DA" }
find_keyword = { fg = "#5F8A0F", bg = "#F2F0EA", bold = true }
find_position = { fg = "#1F4FB0", bg = "reset", bold = true }
marker_copied = { fg = "#3F7A1F", bg = "#3F7A1F" }
marker_cut = { fg = "#B8276F", bg = "#B8276F" }
marker_marked = { fg = "#9F4A0E", bg = "#9F4A0E" }
marker_selected = { fg = "#5F8A0F", bg = "#5F8A0F" }
count_copied = { fg = "#F9F8F2", bg = "#3F7A1F", bold = true }
count_cut = { fg = "#F9F8F2", bg = "#B8276F", bold = true }
count_selected = { fg = "#F9F8F2", bg = "#5F8A0F", bold = true }
border_symbol = "│"
border_style = { fg = "#D8D4C7" }

[tabs]
active = { fg = "#F9F8F2", bg = "#5F8A0F", bold = true }
inactive = { fg = "#3D3D3D", bg = "#F2F0EA" }

[mode]
normal_main = { fg = "#F9F8F2", bg = "#5F8A0F", bold = true }
normal_alt = { fg = "#5F8A0F", bg = "#F2F0EA" }
select_main = { fg = "#F9F8F2", bg = "#1F4FB0", bold = true }
select_alt = { fg = "#1F4FB0", bg = "#F2F0EA" }
unset_main = { fg = "#F9F8F2", bg = "#9F4A0E", bold = true }
unset_alt = { fg = "#9F4A0E", bg = "#F2F0EA" }

[status]
perm_sep = { fg = "#D8D4C7" }
perm_type = { fg = "#1F4FB0" }
perm_read = { fg = "#9F4A0E" }
perm_write = { fg = "#B8276F" }
perm_exec = { fg = "#3F7A1F" }
progress_label = { fg = "#1F1F1F", bold = true }
progress_normal = { fg = "#3F7A1F", bg = "#E6E3DA" }
progress_error = { fg = "#F9F8F2", bg = "#B8276F", bold = true }

[pick]
border = { fg = "#D8D4C7" }
active = { fg = "#5F8A0F", bold = true }
inactive = {}

[input]
border = { fg = "#D8D4C7" }
title = {}
value = {}
selected = { fg = "#5F8A0F", bold = true }

[cmp]
border = { fg = "#D8D4C7" }

[tasks]
border = { fg = "#D8D4C7" }
title = { fg = "#5F8A0F", bold = true }
hovered = { fg = "#1F1F1F", bg = "#E6E3DA" }

[which]
mask = { fg = "#D8D4C7" }
cand = { fg = "#5F8A0F" }
rest = { fg = "#7A7568" }
desc = { fg = "#1F4FB0" }
separator = " > "
separator_style = { fg = "#D8D4C7" }

[help]
on = { fg = "#5F8A0F", bold = true }
run = { fg = "#1F4FB0" }
hovered = { fg = "#1F1F1F", bg = "#E6E3DA", bold = true }
footer = { fg = "#F9F8F2", bg = "#5F8A0F", bold = true }

[spot]
border = { fg = "#D8D4C7" }
title = { fg = "#5F8A0F", bold = true }
tbl_col = { fg = "#1F4FB0" }
tbl_cell = { fg = "#1F1F1F", bg = "#E6E3DA" }

[notify]
title_info = { fg = "#3F7A1F" }
title_warn = { fg = "#9F4A0E" }
title_error = { fg = "#B8276F" }

[filetype]
rules = [
  { mime = "image/*", fg = "#7E2A9A" },
  { mime = "{audio,video}/*", fg = "#B8276F" },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#9F4A0E" },
  { mime = "application/{pdf,doc,rtf}", fg = "#1F4FB0" },
  { mime = "vfs/{absent,stale}", fg = "#A8A395" },
  { url = "*", fg = "#1F1F1F" },
  { url = "*/", fg = "#1F4FB0" },
]
