# Bizarre Void - bottom
# Merge into ~/.config/bottom/bottom.toml.
[styles]

[styles.cpu]
all_entry_color = "#C6FF24"
avg_entry_color = "#7BB3FF"
cpu_core_colors = ["#C6FF24", "#7BB3FF", "#FF9E3D", "#FFB85C", "#D88AE0", "#5BD06B"]

[styles.memory]
ram_color = "#C6FF24"
cache_color = "#7BB3FF"
swap_color = "#FFB85C"
arc_color = "#FF9E3D"
gpu_colors = ["#7BB3FF", "#D88AE0", "#FFB85C"]

[styles.network]
rx_color = "#7BB3FF"
tx_color = "#C6FF24"
rx_total_color = "#FF9E3D"
tx_total_color = "#5BD06B"

[styles.battery]
high_battery_color = "#5BD06B"
medium_battery_color = "#FFB85C"
low_battery_color = "#FF6F77"

[styles.tables]
headers = { color = "#C6FF24", bg_color = "#1A1A1A", bold = true }

[styles.graphs]
graph_color = "#C6FF24"
legend_text = { color = "#9C9C9C", bg_color = "#0E0E0E" }

[styles.widgets]
border_color = "#3D3D3D"
selected_border_color = "#C6FF24"
widget_title = { color = "#C6FF24", bg_color = "#0E0E0E" }
text = { color = "#E4E4E4", bg_color = "#0E0E0E" }
selected_text = { color = "#F9F8F2", bg_color = "#2B3A0E", bold = true }
disabled_text = { color = "#545454" }
thread_text = { color = "#7BB3FF" }
