system: "base16"
name: "Bizarre Void Hi-Contrast"
author: "Bizarre Industries"
variant: "dark"
description: "Bizarre Industries — dark register."
palette:
  base00: "000000"  # default bg
  base01: "0E0E0E"  # lighter bg
