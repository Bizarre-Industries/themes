  base06: "F9F8F2"  # light fg
  base07: "FFFFFF"  # lightest fg
  base08: "FF6B73"  # red / variables
  base09: "FFC25A"  # orange / numbers
  base0A: "C6FF24"  # yellow / classes
  base0B: "E4E4E4"  # green / strings (de-emphasized)
  base0C: "9DE5E5"  # cyan / regex
  base0D: "C6FF24"  # lime / functions (the hero)
  base0E: "E8A8EE"  # magenta / keywords/constants
  base0F: "7FB7FF"  # blue / types
